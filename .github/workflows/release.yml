name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to use for the draft release (e.g. v0.1.0-test)'
        required: true
        default: 'v0.0.0-draft'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: gazu-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gazu-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gazu-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/gazu

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C target/${{ matrix.target }}/release gazu

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive target/${{ matrix.target }}/release/gazu.exe ${{ matrix.artifact }}.zip

      - name: Upload to release (Linux / macOS)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: ${{ matrix.artifact }}.tar.gz

      - name: Upload to release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: ${{ matrix.artifact }}.zip
