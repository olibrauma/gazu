name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  check-formats:
    name: Check HTML_FORMATS
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: "3.7"

      - name: Verify HTML_FORMATS matches pandoc 3.7
        run: bash util/check-html-formats.sh --check

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            apt: libwebkit2gtk-4.1-dev libgtk-3-dev xvfb
            test_args: --locked
          - os: macos-latest
            test_args: --locked
          - os: windows-latest
            test_args: --locked --bin gazu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: "3.7"

      - name: Tests
        run: cargo test ${{ matrix.test_args }}
